<div id="moonGolfWrap" style="background:#08112b;color:#fff;text-align:center;padding:20px;font-family:Arial,sans-serif;border-radius:12px;max-width:1000px;margin:20px auto;"> <style> #moonGolfWrap h1,#moonGolfWrap h2,#moonGolfWrap p{margin:10px 0} #moonGolfWrap .mg-controls{margin:14px 0} #moonGolfWrap select,#moonGolfWrap button{font-size:18px;padding:8px 12px} #moonGolfWrap button{cursor:pointer} #moonGolfWrap .mg-course{ width:100%; max-width:950px; margin:18px auto; position:relative; border-radius:12px; overflow:hidden; box-shadow:0 0 18px rgba(0,0,0,0.35); } #moonGolfWrap <img src="tee2.png" style="width:100%;height:auto;border-radius:12px;"> #moonGolfWrap #mgBall{ position:absolute; width:12px; height:12px; border-radius:50%; background:radial-gradient(circle at 35% 35%, #fff 0 35%, #d8d8d8 70%, #bdbdbd 100%); box-shadow:0 0 4px rgba(0,0,0,0.35); left:50%; bottom:42px; transform:translate(-50%,50%); transition:left 0.45s ease,bottom 0.45s ease; pointer-events:none; } #moonGolfWrap .mg-stats{font-size:18px} #moonGolfWrap #mgResult{font-weight:bold;min-height:28px} </style> <h1>Moon Golf V2</h1> <h2>Hole 1 — Par 4 — 380 Yards</h2> <p>Fairway ends at 240 yards | Bunkers at 250 yards</p> <div class="mg-controls"> <select id="mgForce"> <option value="60">60%</option> <option value="75" selected>75%</option> <option value="90">90%</option> <option value="100">100%</option> </select> <button onclick="moonGolfShot()">Take Shot</button> </div> <div class="mg-course"> <svg viewBox="0 0 1000 520" aria-label="Moon Golf Hole 1"> <!-- sky --> <rect x="0" y="0" width="1000" height="220" fill="#06112d"/> <circle cx="810" cy="85" r="36" fill="#d9e6ff"/> <circle cx="802" cy="77" r="10" fill="#a9bddf" opacity="0.65"/> <circle cx="825" cy="97" r="7" fill="#b8c8e6" opacity="0.65"/> <!-- stars --> <g fill="#ffffff" opacity="0.9"> <circle cx="70" cy="45" r="1.5"/><circle cx="120" cy="80" r="1.2"/><circle cx="200" cy="60" r="1.5"/> <circle cx="280" cy="42" r="1.3"/><circle cx="350" cy="70" r="1.4"/><circle cx="430" cy="35" r="1.6"/> <circle cx="520" cy="65" r="1.3"/><circle cx="610" cy="48" r="1.5"/><circle cx="700" cy="75" r="1.2"/> <circle cx="760" cy="52" r="1.5"/><circle cx="900" cy="58" r="1.4"/><circle cx="950" cy="90" r="1.2"/> <circle cx="160" cy="110" r="1.1"/><circle cx="255" cy="120" r="1.4"/><circle cx="395" cy="105" r="1.1"/> <circle cx="560" cy="120" r="1.2"/><circle cx="675" cy="110" r="1.5"/><circle cx="840" cy="125" r="1.1"/> </g> <!-- distant moon hills --> <path d="M0,205 C120,165 250,180 360,150 C470,120 620,170 760,145 C870,125 940,145 1000,120 L1000,250 L0,250 Z" fill="#bdb7b0"/> <path d="M0,230 C170,205 290,230 400,195 C550,150 710,220 860,180 C930,165 970,180 1000,170 L1000,285 L0,285 Z" fill="#9d978f"/> <!-- lunar ground --> <rect x="0" y="220" width="1000" height="300" fill="#7f796f"/> <!-- craters --> <g fill="#615b53" opacity="0.65"> <ellipse cx="120" cy="330" rx="50" ry="18"/> <ellipse cx="880" cy="310" rx="64" ry="24"/> <ellipse cx="770" cy="420" rx="58" ry="22"/> <ellipse cx="245" cy="435" rx="70" ry="24"/> <ellipse cx="935" cy="465" rx="40" ry="16"/> </g> <!-- domes --> <g> <ellipse cx="175" cy="225" rx="52" ry="18" fill="#d6d8df"/> <ellipse cx="270" cy="220" rx="82" ry="28" fill="#dfe2ea"/> <ellipse cx="375" cy="228" rx="44" ry="16" fill="#d6d8df"/> <rect x="123" y="225" width="104" height="10" fill="#8fb3d9"/> <rect x="188" y="220" width="164" height="14" fill="#7ea7d5"/> <rect x="331" y="228" width="88" height="8" fill="#8fb3d9"/> </g> <!-- green rough corridor --> <path d="M315,460 C300,390 330,330 365,290 C402,247 445,215 497,190 C552,164 620,152 670,148 C732,143 786,154 838,182 L858,210 C796,174 732,164 673,169 C619,174 565,189 515,213 C466,236 425,269 393,309 C361,350 343,393 350,460 Z" fill="#4c7e33"/> <!-- fairway --> <path d="M362,460 C350,398 374,348 405,307 C438,264 479,232 526,209 C577,184 637,173 688,174 C738,175 781,188 823,212 C789,207 757,207 728,212 C679,220 642,239 610,264 C579,288 552,318 520,341 C488,365 447,382 402,393 C387,397 374,409 362,460 Z" fill="#86d261"/> <!-- fairway stripes --> <g opacity="0.18" fill="#ffffff"> <path d="M395,435 L430,235 L455,230 L418,440 Z"/> <path d="M445,420 L478,220 L504,212 L468,428 Z"/> <path d="M496,400 L528,201 L556,191 L520,410 Z"/> <path d="M551,372 L579,184 L609,177 L577,385 Z"/> <path d="M610,340 L632,174 L663,172 L639,357 Z"/> <path d="M669,312 L684,174 L715,176 L698,330 Z"/> </g> <!-- green --> <ellipse cx="792" cy="210" rx="78" ry="34" fill="#96df71"/> <rect x="790" y="176" width="3" height="22" fill="#ffffff"/> <path d="M793 176 L820 184 L793 191 Z" fill="#ffd84a"/> <!-- bunkers --> <ellipse cx="726" cy="202" rx="22" ry="10" fill="#d8c7a1"/> <ellipse cx="846" cy="197" rx="18" ry="8" fill="#d8c7a1"/> <!-- tee --> <ellipse cx="500" cy="455" rx="140" ry="44" fill="#8bdb66"/> <ellipse cx="500" cy="455" rx="132" ry="38" fill="#78ca54"/> </svg> <div id="mgBall"></div> </div> <div class="mg-stats"> <p>Distance Remaining: <span id="mgDistance">380</span></p> <p>Shots Taken: <span id="mgShots">0</span></p> <p id="mgResult"></p> </div> </div> <script> let mgDistance = 380; let mgShots = 0; function moonGolfPath(progress) { const start = { x: 50, y: 8 }; const end = { x: 79, y: 71 }; const curve = 6 * Math.sin(progress * Math.PI * 0.9); return { x: start.x + (end.x - start.x) * progress + curve, y: start.y + (end.y - start.y) * progress }; } function moonGolfShot() { const force = document.getElementById("mgForce").value; let hit; let outcome = Math.random(); if (force == 60) { hit = Math.floor(Math.random() * 35) + 140; } else if (force == 75) { if (outcome < 0.10) hit = Math.floor(Math.random() * 20) + 180; else if (outcome < 0.55) hit = Math.floor(Math.random() * 25) + 160; else if (outcome < 0.80) hit = Math.floor(Math.random() * 30) + 140; else if (outcome < 0.90) hit = Math.floor(Math.random() * 30) + 140; else hit = Math.floor(Math.random() * 70) + 80; } else if (force == 90) { hit = Math.floor(Math.random() * 40) + 170; } else { hit = Math.floor(Math.random() * 70) + 150; } mgDistance -= hit; if (mgDistance < 0) mgDistance = 0; mgShots++; let total = 380 - mgDistance; let lie = "Fairway"; if (total > 240 && total <= 260) lie = "Bunker"; if (total > 260) lie = "Rough"; document.getElementById("mgDistance").innerText = mgDistance; document.getElementById("mgShots").innerText = mgShots; let progress = (380 - mgDistance) / 380; let point = moonGolfPath(progress); let missX = 0; if (force == 75) { if (outcome >= 0.55 && outcome < 0.80) missX = -6; else if (outcome >= 0.80 && outcome < 0.90) missX = 6; } if (lie == "Rough") missX *= 1.5; if (lie == "Bunker") { missX = 9; point.y = 60; } document.getElementById("mgBall").style.left = (point.x + missX) + "%"; document.getElementById("mgBall").style.bottom = point.y + "%"; if (mgDistance === 0) { document.getElementById("mgResult").innerText = "Hole finished in " + mgShots + " shots"; return; } let label = "Standard"; if (force == 75) { if (outcome < 0.10) label = "Good"; else if (outcome < 0.55) label = "Decent"; else if (outcome < 0.80) label = "Slice"; else if (outcome < 0.90) label = "Hook"; else label = "Poor"; } document.getElementById("mgResult").innerText = "Outcome: " + label + " | Shot Distance: " + hit + " yards | Lie: " + lie; } </script>
